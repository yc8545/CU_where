<!DOCTYPE html>
<html>
<head>
  <title>CU-Where</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

  <div class="login-card">

    <h1 class="brand">CU-Where</h1>
    <p class="tagline">Smart Campus Presence Monitoring</p>

    <div class="toggle-buttons">
      <button id="loginTab" class="active" onclick="switchMode('login')">Login</button>
      <button id="signupTab" onclick="switchMode('signup')">Sign Up</button>
    </div>

    <div class="form-group">
      <input type="text" id="username" placeholder="Enter Username">
    </div>

    <div class="form-group">
      <input type="password" id="password" placeholder="Enter Password">
    </div>

    <div class="form-group">
      <select id="role">
        <option value="student">👩‍🎓 Student</option>
        <option value="teacher">👨‍🏫 Teacher</option>
        <option value="hod">👨‍💼 HOD</option>
      </select>
    </div>

    <button class="main-btn" onclick="handleAuth()" id="actionBtn">
      Login
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
